services:
  db:
    image: postgres:latest
    env_file: .env
    volumes:
      - challenge-loop-prod:/var/lib/postgresql
      - ./src/init_data:/docker-entrypoint-initdb.d
    restart: always

  web:
    build: .
    env_file: .env
    environment:
      - NODE_ENV=production
    depends_on:
      - db
    ports:
      - '3000:3000'
    restart: always

volumes:
  challenge-loop-prod:
